<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Mikaely Nails</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fef1f6; color: #4a4a4a; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(216, 27, 96, 0.1); width: 100%; max-width: 450px; border-top: 5px solid #d81b60; }
        h1 { color: #d81b60; text-align: center; margin-bottom: 5px; font-size: 26px; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; background-color: #fafafa; transition: 0.3s; }
        input:focus, select:focus { border-color: #d81b60; outline: none; background-color: #fff; box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.1); }
        button { background-color: #d81b60; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #ad144d; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="card">
        <h1>Mikaely Nails 💅</h1>
        <p class="subtitle">Escolha seu melhor momento e agende sua sessão</p>
        
        <div class="form-group">
            <label for="nome">Seu Nome Completo:</label>
            <input type="text" id="nome" placeholder="Ex: Ana Clara Souza">
        </div>
        <div class="form-group">
            <label for="data">Selecione o Dia:</label>
            <input type="date" id="data">
        </div>
        <div class="form-group">
            <label for="hora">Selecione o Horário:</label>
            <select id="hora">
                <option value="">Clique para ver as opções...</option>
                <option value="09:00">09:00</option>
                <option value="10:30">10:30</option>
                <option value="13:30">13:30</option>
                <option value="15:00">15:00</option>
                <option value="16:30">16:30</option>
            </select>
        </div>
        <button id="btnConfirmar" onclick="enviarAgendamento()">Confirmar Meu Horário</button>
    </div>

    <script>
        // URL que você gerou no Apps Script inserida aqui:
        const URL_API = "https://script.google.com/macros/s/AKfycby7b8SfU_EuqlQXJh6Txba5ZjndtKJHdN_KRvtaBNA2gs9-3kZMNTdNA8rRIF0wNmdn/exec";

        function enviarAgendamento() {
            const nome = document.getElementById('nome').value;
            const data = document.getElementById('data').value;
            const hora = document.getElementById('hora').value;
            const btn = document.getElementById('btnConfirmar');
            
            if(!nome || !data || !hora) {
                alert("Por favor, preencha todos os campos do agendamento.");
                return;
            }

            btn.innerText = "Salvando...";
            btn.disabled = true;

            const pacote = { acao: "criar", data: data, hora: hora, nome: nome, status: 'Agendado' };

            fetch(URL_API, {
                method: 'POST',
                mode: 'no-cors', // ISSO RESOLVE O ERRO DE COMUNICAÇÃO
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(pacote)
            }).then(() => {
                alert("Perfeito! Seu horário foi reservado com a Mikaely.");
                document.getElementById('nome').value = "";
                document.getElementById('data').value = "";
                document.getElementById('hora').value = "";
                btn.innerText = "Confirmar Meu Horário";
                btn.disabled = false;
            }).catch(erro => {
                alert("Erro de comunicação com a planilha.");
                btn.innerText = "Confirmar Meu Horário";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
