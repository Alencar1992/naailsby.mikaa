<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Mikaely - Manicure</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fdf0f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #d81b60; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #d81b60; color: white; border: none; padding: 12px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background-color: #ad144d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mikaa Nail Designer💅</h1>
        <h2>Agende seu Horário</h2>
        
        <div class="form-group">
            <label for="nomeCliente">Seu Nome:</label>
            <input type="text" id="nomeCliente" placeholder="Ex: Maria Silva">
        </div>
        <div class="form-group">
            <label for="dataCliente">Escolha o Dia:</label>
            <input type="date" id="dataCliente">
        </div>
        <div class="form-group">
            <label for="horaCliente">Escolha o Horário:</label>
            <select id="horaCliente">
                <option value="">Selecione um horário...</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
            </select>
        </div>
        <button onclick="salvarAgendamento()">Confirmar Agendamento</button>
    </div>

    <script>
        const URL_BACKEND = "https://script.google.com/macros/s/AKfycbxxz7eyJ3ZNjQbzI3r5DEyZnDisW007duscF-1H6js1oQmj71sHiNCZ26CiIhm1xmw/exec"; 

        function salvarAgendamento() {
            const nome = document.getElementById('nomeCliente').value;
            const data = document.getElementById('dataCliente').value;
            const hora = document.getElementById('horaCliente').value;
            
            if(!nome || !data || !hora) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            const pacote = { data: data, hora: hora, nome: nome, status: 'Agendado' };

            fetch(URL_BACKEND, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pacote)
            }).then(() => {
                alert("Horário agendado com sucesso!");
                document.getElementById('nomeCliente').value = "";
                document.getElementById('dataCliente').value = "";
                document.getElementById('horaCliente').value = "";
            }).catch(erro => {
                alert("Houve um erro de comunicação. Tente novamente.");
            });
        }
    </script>
</body>
</html>
