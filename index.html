<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mikaa Nails - Agendamento</title>
    <style>
        :root { --gold: #D4AF37; --dark: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background: var(--dark); color: #fff; min-height: 100vh; overflow-x: hidden; }

        /* SPLASH SCREEN (Regra 1.1) */
        #splashClient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            background: url('logomika') no-repeat center center; background-size: cover;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            transition: opacity 0.5s;
        }
        .splash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.8) 100%); pointer-events: none; }
        .glow { position: absolute; top:-50px; right:-50px; width:200px; height:200px; background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%); }
        .star { position: absolute; width: 3px; height: 3px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 5px var(--gold); animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        
        .logo-box { position: relative; z-index: 2; margin-top: 30vh; display: flex; flex-direction: column; align-items: center; }
        .ring-spin { position: absolute; width: 140px; height: 140px; border-radius: 50%; border: 1px solid transparent; border-top: 2px solid var(--gold); animation: spin 6s linear infinite; }
        .ring-glow { width: 120px; height: 120px; border-radius: 50%; box-shadow: 0 0 20px rgba(212,175,55,0.3); display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .ring-glow h1 { font-family: Georgia, serif; font-size: 32px; color: var(--gold); margin: 0; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .subtitle { margin-top: 15px; font-size: 14px; letter-spacing: 4px; color: var(--gold); font-family: Georgia, serif; border-top: 1px solid rgba(212,175,55,0.5); padding-top: 5px; }

        .btn-agendar {
            position: relative; z-index: 2; margin-bottom: env(safe-area-inset-bottom, 30px);
            width: 90%; padding: 18px; border-radius: 18px; cursor: pointer;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(212,175,55,0.40);
            color: rgba(255,255,255,0.9); font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
            backdrop-filter: blur(14px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); font-family: Georgia, serif;
        }
        
        /* APP PRINCIPAL (Oculto até clicar em Agendar) */
        #appMain { display: none; padding: 20px; opacity: 0; transition: opacity 0.4s; background: url('logomika') no-repeat center center fixed; background-size: cover; min-height: 100vh; }
        .card-glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(212,175,55,0.3); padding: 24px; border-radius: 20px; margin-bottom: 20px; }
        
        /* CALENDÁRIO */
        .header-mes { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--gold); font-size: 18px; font-weight: bold; }
        .nav-mes { padding: 5px 15px; cursor: pointer; color: var(--gold); }
        .dias-semana { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #aaa; margin-bottom: 10px; }
        .grid-calendario { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .dia { padding: 12px 0; text-align: center; background: rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; border: 1px solid transparent; font-weight: bold; }
        .dia:active { transform: scale(0.95); }
        .dia:not(.bloqueado) { border-color: rgba(212,175,55,0.2); }
        .dia:hover:not(.bloqueado) { background: rgba(212,175,55,0.2); border-color: var(--gold); color: var(--gold); }
        .dia.vazio { background: transparent; border: none; cursor: default; }
        .dia.bloqueado { background: rgba(0,0,0,0.4); color: #555; text-decoration: line-through; cursor: not-allowed; }

        /* BOTTOM SHEET */
        .bottom-sheet-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; display: flex; align-items: flex-end; }
        .bottom-sheet-overlay.show { opacity: 1; pointer-events: auto; }
        .bottom-sheet { background: #1a1a1a; border-top: 1px solid var(--gold); width: 100%; padding: 24px 20px env(safe-area-inset-bottom, 24px); border-radius: 24px 24px 0 0; transform: translateY(100%); transition: 0.3s; max-height: 90vh; overflow-y: auto; }
        .bottom-sheet-overlay.show .bottom-sheet { transform: translateY(0); }
        
        input, select { width: 100%; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 12px; color: white; padding: 0 16px; margin-top: 5px; margin-bottom: 15px; font-size: 16px; }
        input:focus, select:focus { border-color: var(--gold); outline: none; }
        label { font-size: 13px; color: var(--gold); }
        
        .box-servicos { max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .box-servicos label { display: flex; align-items: center; color: white; font-size: 14px; margin-bottom: 10px; }
        .box-servicos input { width: 20px; height: 20px; margin: 0 10px 0 0; accent-color: var(--gold); }
        
        .btn-full { width: 100%; height: 50px; border-radius: 12px; background: var(--gold); color: black; font-weight: bold; border: none; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .btn-full.cancelar { background: #333; color: white; }
    </style>
</head>
<body>

    <div id="splashClient">
        <div class="splash-overlay"></div>
        <div class="glow"></div>
        <div id="starContainer"></div>
        
        <div class="logo-box">
            <div class="ring-spin"></div>
            <div class="ring-glow"><h1>Mikaa</h1></div>
            <div class="subtitle">NAIL DESIGNER</div>
        </div>

        <button class="btn-agendar" onclick="entrarApp()">Agendar Agora</button>
    </div>

    <div id="appMain">
        <div id="syncStatus" style="display:none;"></div>
        
        <div class="card-glass" id="telaCalendario">
            <h2 style="text-align:center; color:var(--gold); margin-top:0;">Agendar Horário</h2>
            <div class="header-mes">
                <div class="nav-mes" onclick="mudarMes(-1)">❮</div>
                <span id="mesAtualStr">Buscando agenda...</span>
                <div class="nav-mes" onclick="mudarMes(1)">❯</div>
            </div>
            <div class="dias-semana"><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div></div>
            <div class="grid-calendario" id="gridDias"></div>
        </div>
        
        <div class="card-glass" id="cardSucesso" style="display:none; text-align:center;">
            <h2 style="color:var(--gold);">✅ Reservado!</h2>
            <p>Seu pedido foi garantido no sistema.</p>
            <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:12px; text-align:left; margin-bottom:20px;">
                Nome: <span id="resNome"></span><br><br>Data: <span id="resData"></span> às <span id="resHora"></span><br><br>Total: R$ <span id="resTotal"></span>
            </div>
            <button class="btn-full" onclick="enviarWhats()" style="background:#25D366; color:white;">Confirmar via WhatsApp</button>
            <button class="btn-full cancelar" onclick="location.reload()">Voltar ao Início</button>
        </div>
    </div>

    <div class="bottom-sheet-overlay" id="modalAgendamento">
        <div class="bottom-sheet">
            <div class="bs-handle"></div>
            <h3 style="color:var(--gold); text-align:center; margin-top:0;">Data: <span id="dataSelecionadaStr"></span></h3>
            <input type="hidden" id="dataEscolhidaISO">
            
            <label>Nome Completo:</label>
            <input type="text" id="nomeCliente" placeholder="Ex: Maria Silva">
            
            <label>WhatsApp (com DDD):</label>
            <input type="tel" id="whatsCliente" inputmode="tel" placeholder="Ex: 11999999999">

            <label>Escolha os Serviços:</label>
            <div class="box-servicos" id="boxServicos"></div>
            <div style="color:var(--gold); font-weight:bold; text-align:right; margin-bottom:15px;">Total: R$ <span id="valorCalculado">0,00</span></div>

            <label>Horários Livres (Tempo Real):</label>
            <select id="horaEscolhida"></select>
            
            <button class="btn-full" id="btnConfirmar" onclick="salvarAgendamento()">Agendar Horário</button>
            <button class="btn-full cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbwD0yJLhedjvUhurv_28YxH_65s96E62tW6cxfvYECI2Fr6ZE4sIaBFmzoUcnpFkaTO/exec"; // <<< URL DO APPS SCRIPT V5 AQUI
        
        // ANIMAÇÃO DE ESTRELAS NA SPLASH
        const sc = document.getElementById('starContainer');
        for(let i=0; i<15; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 50 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = (Math.random() * 2) + 's';
            sc.appendChild(star);
        }

        function entrarApp() {
            document.getElementById('splashClient').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splashClient').style.display = 'none';
                let am = document.getElementById('appMain');
                am.style.display = 'block'; setTimeout(()=> am.style.opacity = '1', 50);
            }, 500);
        }

        // SMART POLLING (TEMPO REAL) COM ETAG
        let cache = { agendamentos: [], servicos: [], configuracoes: [], etag: "" };
        let mesVisao = new Date();
        const diasSemanaNomes = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];

        function escutarBancoDeDados() {
            fetch(URL_API + "?nocache=" + new Date().getTime())
                .then(res => res.json())
                .then(dados => {
                    // Verifica se houve mudança usando o hash ETag
                    if (dados.etag !== cache.etag) {
                        cache = dados;
                        
                        // Atualiza interface silenciosamente sem piscar a tela
                        if(document.getElementById('appMain').style.display === 'block') {
                            montarCalendario();
                            
                            // Se o usuário estiver no modal com ele aberto, atualiza a lista de horários
                            if (document.getElementById('modalAgendamento').classList.contains('show')) {
                                let dh = document.getElementById('dataEscolhidaISO').value;
                                if(dh) recarregarHorariosNoModal(dh);
                            }
                        }
                    }
                }).catch(err => console.log(err));
        }
        escutarBancoDeDados();
        setInterval(escutarBancoDeDados, 4000); // Bate a cada 4 segundos

        // CALENDÁRIO LOGIC
        function mudarMes(d) { mesVisao.setMonth(mesVisao.getMonth() + d); montarCalendario(); }
        function montarCalendario() {
            const grid = document.getElementById('gridDias'); grid.innerHTML = '';
            let ano = mesVisao.getFullYear(); let mes = mesVisao.getMonth();
            document.getElementById('mesAtualStr').innerText = mesVisao.toLocaleString('pt-BR', {month:'long'}) + " " + ano;
            
            let pDia = new Date(ano, mes, 1).getDay(); let dMes = new Date(ano, mes + 1, 0).getDate();
            let hoje = new Date(); hoje.setHours(0,0,0,0);
            
            for(let i=0; i<pDia; i++) grid.innerHTML += `<div class="dia vazio"></div>`;
            for(let dia=1; dia<=dMes; dia++) {
                let dtI = new Date(ano, mes, dia); let nmDia = diasSemanaNomes[dtI.getDay()];
                let dtIso = `${ano}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                
                let div = document.createElement('div'); div.innerText = dia;
                let cfg = cache.configuracoes.find(c => c.dia === nmDia);
                let bloqueioGeral = cache.agendamentos.some(a => a.data === dtIso && a.hora === 'DIA_INTEIRO' && a.status === 'Bloqueado');
                
                if(dtI < hoje || (cfg && cfg.ativo === 'nao') || bloqueioGeral) {
                    div.className = 'dia bloqueado';
                } else {
                    div.className = 'dia'; div.onclick = () => abrirModal(dtIso, nmDia, dia, mes, ano);
                }
                grid.appendChild(div);
            }
        }

        // MODAL
        function abrirModal(iso, nmdia, dia, mes, ano) {
            document.getElementById('dataEscolhidaISO').value = iso;
            document.getElementById('dataSelecionadaStr').innerText = `${String(dia).padStart(2,'0')}/${String(mes+1).padStart(2,'0')}/${ano}`;
            
            let bx = document.getElementById('boxServicos'); bx.innerHTML = '';
            let srvs = cache.servicos.filter(s => s.status === 'ativo');
            srvs.forEach(s => {
                let valF = parseFloat(s.valor).toFixed(2).replace('.',',');
                bx.innerHTML += `<label><input type="checkbox" value="${s.nome}" data-preco="${s.valor}" onchange="calcTotal()"> ${s.nome} (R$ ${valF})</label>`;
            });
            calcTotal();
            recarregarHorariosNoModal(iso, nmdia);
            document.getElementById('modalAgendamento').classList.add('show');
        }
        
        function recarregarHorariosNoModal(iso, nmDiaCache = null) {
            // Se omitiu o dia (recarregamento via polling), encontra:
            if(!nmDiaCache) { let dArr = iso.split('-'); nmDiaCache = diasSemanaNomes[new Date(dArr[0], dArr[1]-1, dArr[2]).getDay()]; }
            
            let cfg = cache.configuracoes.find(c => c.dia === nmDiaCache) || {inicio:"09:00", fim:"18:00", pausaInicio:"12:00", pausaFim:"13:00", intervalo:"30"};
            let ocupados = cache.agendamentos.filter(a => a.data === iso && a.status !== 'Cancelado').map(a => a.hora);
            
            let hr = document.getElementById('horaEscolhida'); hr.innerHTML = '';
            let hi = cvt(cfg.inicio); let hf = cvt(cfg.fim); let pi = cvt(cfg.pausaInicio); let pf = cvt(cfg.pausaFim); let int = parseInt(cfg.intervalo)||30;
            
            let temVaga = false;
            while(hi < hf) {
                if(hi < pi || hi >= pf) {
                    let st = cvts(hi);
                    if(!ocupados.includes(st)) { hr.innerHTML += `<option value="${st}">${st}</option>`; temVaga = true; }
                }
                hi += int;
            }
            if(!temVaga) { hr.innerHTML = '<option value="">Sem horários disponíveis</option>'; }
        }
        function cvt(s) { if(!s)return 0; let[h,m]=s.split(':').map(Number); return (h*60)+m; }
        function cvts(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }

        function calcTotal() {
            let t = 0; document.querySelectorAll('.box-servicos input:checked').forEach(c => t += parseFloat(c.getAttribute('data-preco')));
            document.getElementById('valorCalculado').innerText = t.toFixed(2).replace('.',','); return t;
        }
        function fecharModal() { document.getElementById('modalAgendamento').classList.remove('show'); }

        // ENVIO COM TRAVA (Regra 2.5b)
        function salvarAgendamento() {
            const data = document.getElementById('dataEscolhidaISO').value; const hora = document.getElementById('horaEscolhida').value;
            const nome = document.getElementById('nomeCliente').value; const whats = document.getElementById('whatsCliente').value;
            const btn = document.getElementById('btnConfirmar');
            let sel = Array.from(document.querySelectorAll('.box-servicos input:checked')).map(c=>c.value).join(', '); let tot = calcTotal();
            if(!nome || !whats) return alert("Preencha nome e WhatsApp"); if(!sel) return alert("Escolha um serviço"); if(!hora) return alert("Horário inválido");

            btn.innerText = "Verificando..."; btn.disabled = true;

            const p = new URLSearchParams(); p.append('acao', 'criar_agendamento'); p.append('data', data); p.append('hora', hora); p.append('nome', nome);
            p.append('whatsapp', whats); p.append('servicos', sel); p.append('total', tot); p.append('status', 'Agendado'); p.append('pagamento', 'Pendente');

            fetch(URL_API, { method: 'POST', mode: 'no-cors', body: p }).then(() => {
                // Como não podemos ler o JSON do POST via CORS no Google Script, batemos o polling 1 seg depois para verificar se entrou.
                setTimeout(() => {
                    fetch(URL_API + "?nocache=" + new Date().getTime()).then(r=>r.json()).then(d => {
                        cache = d;
                        let confirmou = d.agendamentos.some(a => a.data === data && a.hora === hora && a.nome === nome);
                        if(confirmou) {
                            document.getElementById('resNome').innerText = nome; document.getElementById('resData').innerText = data.split('-').reverse().join('/'); document.getElementById('resHora').innerText = hora; document.getElementById('resTotal').innerText = tot.toFixed(2).replace('.',',');
                            fecharModal(); document.getElementById('telaCalendario').style.display='none'; document.getElementById('cardSucesso').style.display='block';
                        } else {
                            alert("⚠️ Este horário acabou de ser reservado por outra pessoa. Por favor, escolha outro.");
                            recarregarHorariosNoModal(data); btn.innerText = "Agendar Horário"; btn.disabled = false;
                        }
                    });
                }, 1000);
            });
        }
        function enviarWhats() {
            let wp = cache.geral.find(g=>g.chave==='whatsapp'); let nm = wp ? wp.valor.replace(/\D/g,'') : "5511977729557";
            let txt = `Olá Mikaely! Sou ${document.getElementById('resNome').innerText}. Agendei para dia ${document.getElementById('resData').innerText} às ${document.getElementById('resHora').innerText}.`;
            window.open(`https://wa.me/${nm}?text=${encodeURIComponent(txt)}`, '_blank');
        }
    </script>
</body>
</html>
