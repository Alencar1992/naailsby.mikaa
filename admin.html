<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Mikaely</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e3f2fd; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #1565c0; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #1565c0; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0d47a1; }
        .btn-bloqueio { background-color: #d32f2f; width: 100%; margin-top: 10px; }
        .btn-bloqueio:hover { background-color: #b71c1c; }
        .lista-agendamentos { background: #f9f9f9; padding: 12px; border-left: 5px solid #1565c0; margin-bottom: 10px; border-radius: 4px; }
        .bloqueado { border-left-color: #d32f2f; background-color: #ffebee; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚙️ Agendamentos Clientes - Mikaa Nail Designer</h1>
        
        <div style="background: #ffebee; padding: 15px; border-radius: 5px; margin-bottom: 30px;">
            <h3 style="color: #d32f2f;">Travar Horário / Indisponível</h3>
            <div class="form-group">
                <label>Data:</label>
                <input type="date" id="dataMikaely">
            </div>
            <div class="form-group">
                <label>Horário:</label>
                <select id="horaMikaely">
                    <option value="09:00">09:00</option>
                    <option value="10:00">10:00</option>
                    <option value="11:00">11:00</option>
                    <option value="14:00">14:00</option>
                    <option value="15:00">15:00</option>
                    <option value="16:00">16:00</option>
                </select>
            </div>
            <button class="btn-bloqueio" onclick="bloquearHorario()">Bloquear Este Horário</button>
        </div>

        <h3>Agenda Atual:</h3>
        <button onclick="carregarAgenda()" style="width: 100%; margin-bottom: 15px;">Atualizar Lista de Clientes</button>
        <div id="listaCompleta">
            <p style="text-align: center;">Clique no botão acima para carregar a agenda.</p>
        </div>
    </div>

    <script>
        // Sistema simples de proteção de tela
        const senha = prompt("Acesso Restrito. Digite a senha da Mikaely:");
        if (senha !== "mika123") {
            document.body.innerHTML = "<h1 style='text-align:center; color:red; margin-top:50px;'>Acesso Negado. Senha Incorreta.</h1>";
            throw new Error("Senha incorreta"); // Para o carregamento do resto do script
        }

        const URL_BACKEND = "https://script.google.com/macros/s/AKfycbxxz7eyJ3ZNjQbzI3r5DEyZnDisW007duscF-1H6js1oQmj71sHiNCZ26CiIhm1xmw/exec"; 

        function bloquearHorario() {
            const data = document.getElementById('dataMikaely').value;
            const hora = document.getElementById('horaMikaely').value;
            
            if(!data || !hora) {
                alert("Por favor, selecione data e hora para bloquear!");
                return;
            }

            const pacote = { data: data, hora: hora, nome: "Bloqueio da Mikaely", status: 'Bloqueado' };

            fetch(URL_BACKEND, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pacote)
            }).then(() => {
                alert("Horário bloqueado na agenda!");
                document.getElementById('dataMikaely').value = "";
                carregarAgenda(); // Atualiza a lista automaticamente após bloquear
            }).catch(erro => {
                alert("Houve um erro ao bloquear. Tente novamente.");
            });
        }

        function carregarAgenda() {
            const divLista = document.getElementById('listaCompleta');
            divLista.innerHTML = "Carregando a agenda da planilha, aguarde...";

            fetch(URL_BACKEND)
                .then(resposta => resposta.json())
                .then(dados => {
                    divLista.innerHTML = ""; 
                    if(dados.length === 0) {
                        divLista.innerHTML = "<p>Nenhum agendamento ou bloqueio encontrado.</p>";
                        return;
                    }
                    
                    dados.forEach(item => {
                        // Verifica se é um bloqueio para pintar a caixa de vermelho
                        let classeCaixa = item.status === 'Bloqueado' ? 'lista-agendamentos bloqueado' : 'lista-agendamentos';
                        
                        divLista.innerHTML += `
                            <div class="${classeCaixa}">
                                <strong>Data:</strong> ${item.data.substring(0,10)} | 
                                <strong>Hora:</strong> ${item.hora} <br>
                                <strong>Registro:</strong> ${item.nome} (${item.status})
                            </div>
                        `;
                    });
                })
                .catch(erro => {
                    divLista.innerHTML = "Erro ao carregar a agenda. Verifique sua conexão.";
                });
        }

        // Carrega a agenda automaticamente se a senha estiver certa
        carregarAgenda();
    </script>
</body>
</html>
